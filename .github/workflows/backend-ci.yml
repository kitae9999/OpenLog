name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "settings.gradle.kts"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "settings.gradle.kts"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run backend tests
        run: ./gradlew :backend:test
