services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - openlog-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - openlog

  redis:
    image: redis/redis-stack-server:latest
    restart: unless-stopped
    environment:
      REDIS_ARGS: --protected-mode no --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10 --save 60 10000
    volumes:
      - openlog-redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - openlog

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    env_file:
      - ./production.env
    expose:
      - "8080"
    networks:
      - openlog

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME}
      NGINX_SSL_CERTIFICATE: ${NGINX_SSL_CERTIFICATE}
      NGINX_SSL_CERTIFICATE_KEY: ${NGINX_SSL_CERTIFICATE_KEY}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - openlog

volumes:
  openlog-postgres-data:
  openlog-redis-data:

networks:
  openlog:
    name: openlog
